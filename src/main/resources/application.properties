# Application name
spring.application.name=toeic-backend

# Datasource PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/toeic_db
spring.datasource.username=toeic_user
spring.datasource.password=secret
spring.datasource.hikari.maximum-pool-size=10

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20

# Redis (keep as you have Redis dependency)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Mail (SMTP Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
jwt.secret=${JWT_SECRET:mySuperSecretKeyForJWT12345678901234567890}
jwt.expiration=900000
jwt.refreshExpiration=604800000

# Custom TOEIC SRS settings
toeic.srs.base-interval-hours=1
toeic.srs.max-interval-days=365

# Server
server.port=8080
server.error.include-message=always

# Logging
logging.level.com.toeic=DEBUG