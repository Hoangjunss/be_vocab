# Application name
spring.application.name=toeic-backend

# ===== DATASOURCE =====
# B?T BU?C ph?i set DB_URL, DB_USERNAME, DB_PASSWORD qua env
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

# ===== GOOGLE OAUTH =====
google.client.id=${GOOGLE_CLIENT_ID}

# ===== JPA & HIBERNATE =====
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:none}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20

# ===== FLYWAY (disabled) =====
spring.flyway.enabled=false

# ===== REDIS =====
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ===== MAIL =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===== JWT =====
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===== TOEIC SRS =====
toeic.srs.base-interval-hours=${SRS_BASE_INTERVAL_HOURS:1}
toeic.srs.max-interval-days=${SRS_MAX_INTERVAL_DAYS:365}

# ===== SERVER =====
server.port=${PORT:8080}
server.error.include-message=always

# ===== LOGGING =====
logging.file.name=${LOG_FILE_PATH:logs/application.log}
logging.level.com.toiec=${LOG_LEVEL_COM_TOIEC:INFO}
logging.level.org.springframework=${LOG_LEVEL_SPRING:WARN}
logging.level.org.hibernate=${LOG_LEVEL_HIBERNATE:WARN}